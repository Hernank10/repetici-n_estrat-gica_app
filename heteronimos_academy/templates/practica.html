{% extends "base.html" %}

{% block title %}Práctica{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="text-center mb-4">Práctica Interactiva</h2>
    
    <div class="row">
        <!-- Modo 1: Redacción Creativa -->
        <div class="col-lg-6 mb-4">
            <div class="card h-100">
                <div class="card-header bg-primary text-white">
                    <h5><i class="fas fa-pencil-alt me-2"></i>Redacción Creativa</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Término Masculino</label>
                        <input type="text" id="mascRedaccion" class="form-control" placeholder="Ej: caballo">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Término Femenino</label>
                        <input type="text" id="femRedaccion" class="form-control" placeholder="Ej: yegua">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Oración</label>
                        <textarea id="oracionRedaccion" class="form-control" rows="3" placeholder="Escribe una oración usando ambos términos..."></textarea>
                    </div>
                    <button class="btn btn-success w-100" onclick="guardarEjemplo()">
                        <i class="fas fa-save me-2"></i>Guardar Ejemplo
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Modo 2: Traducción Rápida -->
        <div class="col-lg-6 mb-4">
            <div class="card h-100">
                <div class="card-header bg-success text-white">
                    <h5><i class="fas fa-exchange-alt me-2"></i>Traducción Rápida</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">¿Cuál es el femenino de...?</label>
                        <div class="display-6 text-center my-3" id="palabraActual">cargando...</div>
                    </div>
                    <div class="mb-3">
                        <input type="text" id="respuestaTraduccion" class="form-control" placeholder="Tu respuesta">
                    </div>
                    <button class="btn btn-primary w-100" onclick="verificarTraduccion()">
                        <i class="fas fa-check me-2"></i>Verificar
                    </button>
                    <div id="feedbackTraduccion" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Lista de ejemplos guardados -->
    <div class="card mt-4">
        <div class="card-header bg-info text-white">
            <h5><i class="fas fa-list me-2"></i>Mis Ejemplos Guardados</h5>
        </div>
        <div class="card-body">
            <div id="listaEjemplos"></div>
        </div>
    </div>
</div>

<script>
let heteronimosGlobal = [];

// Cargar heterónimos al inicio
fetch('/api/heteronimos/random')
    .then(res => res.json())
    .then(data => {
        heteronimosGlobal = data;
        document.getElementById('palabraActual').textContent = data.masculino;
    });

function verificarTraduccion() {
    const respuesta = document.getElementById('respuestaTraduccion').value.toLowerCase().trim();
    const correcta = heteronimosGlobal.femenino;
    const feedback = document.getElementById('feedbackTraduccion');
    
    if (respuesta === correcta) {
        feedback.innerHTML = '<div class="alert alert-success">✅ ¡Correcto! Muy bien.</div>';
        // Cargar nuevo heterónimo
        fetch('/api/heteronimos/random')
            .then(res => res.json())
            .then(data => {
                heteronimosGlobal = data;
                document.getElementById('palabraActual').textContent = data.masculino;
                document.getElementById('respuestaTraduccion').value = '';
            });
    } else {
        feedback.innerHTML = `<div class="alert alert-danger">❌ Incorrecto. La respuesta correcta es "${correcta}".</div>`;
    }
}

function guardarEjemplo() {
    const masculino = document.getElementById('mascRedaccion').value.trim();
    const femenino = document.getElementById('femRedaccion').value.trim();
    const oracion = document.getElementById('oracionRedaccion').value.trim();
    
    if (!masculino || !femenino || !oracion) {
        alert('Por favor completa todos los campos');
        return;
    }
    
    fetch('/api/ejemplo/guardar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({masculino, femenino, oracion})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert('¡Ejemplo guardado correctamente!');
            document.getElementById('mascRedaccion').value = '';
            document.getElementById('femRedaccion').value = '';
            document.getElementById('oracionRedaccion').value = '';
            cargarEjemplos();
        }
    });
}

function cargarEjemplos() {
    fetch('/api/ejemplos/usuario')
        .then(res => res.json())
        .then(ejemplos => {
            const container = document.getElementById('listaEjemplos');
            if (ejemplos.length === 0) {
                container.innerHTML = '<p class="text-muted">Aún no has guardado ejemplos.</p>';
                return;
            }
            container.innerHTML = ejemplos.map(e => `
                <div class="card mb-2">
                    <div class="card-body">
                        <strong>${e.masculino} / ${e.femenino}</strong>
                        <p class="mb-0 mt-1">${e.oracion}</p>
                        <small class="text-muted">${e.fecha}</small>
                    </div>
                </div>
            `).join('');
        });
}

cargarEjemplos();
</script>
{% endblock %}
