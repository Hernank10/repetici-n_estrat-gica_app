{% extends "base.html" %}
{% block title %}Configuración{% endblock %}
{% block content %}
<h1>Configuración del Sistema</h1>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label>Modo mantenimiento:</label>
                <input type="checkbox" name="mantenimiento" class="form-check-input">
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>
<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mt-3">Volver</a>
{% endblock %}
